{# Search & Filter Bar #}
<div class="search-filter-bar">
    <div class="search-container">
        <div class="search-input-wrapper">
            <span class="search-icon">🔍</span>
            <input type="text" id="globalSearch" class="search-input" placeholder="Search across all columns... (Ctrl+F)" />
            <button class="clear-search" id="clearSearch">✕</button>
        </div>
        <div class="filter-buttons">
            <button class="filter-btn active" data-filter="all" id="filterAll">
                All Rows <span class="filter-badge" id="badgeAll">{{ source_count }}</span>
            </button>
            <button class="filter-btn" data-filter="mismatch" id="filterMismatch">
                Mismatches <span class="filter-badge" id="badgeMismatch">{{ data|length }}</span>
            </button>
            <button class="filter-btn" data-filter="match" id="filterMatch">
                Matches <span class="filter-badge" id="badgeMatch">{{ matching_rows }}</span>
            </button>
            <button class="filter-btn" data-filter="missing-source" id="filterMissingSource">
                Missing in Source <span class="filter-badge" id="badgeMissingSource">{{ missing_in_source }}</span>
            </button>
            <button class="filter-btn" data-filter="missing-target" id="filterMissingTarget">
                Missing in Target <span class="filter-badge" id="badgeMissingTarget">{{ missing_in_target }}</span>
            </button>
            <div class="export-info">
                📊 <strong>Excel Report Generated</strong> - Check the same directory for the .xlsx file
            </div>
        </div>
    </div>
    <div class="search-stats" id="searchStats">
        Showing <span id="visibleRows">{{ source_count }}</span> of <span id="totalRows">{{ source_count }}</span> rows
    </div>
</div>
