{# Legend Section #}
<div class="legend">
    <h3>🔍 Legend</h3>
    <div class="legend-items">
        <div class="legend-item">
            <div class="legend-color legend-match"></div>
            <div>
                <strong>✓ Match</strong><br>
                <small>Values are identical</small>
            </div>
        </div>
        <div class="legend-item">
            <div class="legend-color legend-mismatch-src"></div>
            <div>
                <strong>← Source Value</strong><br>
                <small>Value from source file</small>
            </div>
        </div>
        <div class="legend-item">
            <div class="legend-color legend-mismatch-tgt"></div>
            <div>
                <strong>→ Target Value</strong><br>
                <small>Value from target file</small>
            </div>
        </div>
        <div class="legend-item">
            <div class="legend-color legend-missing-src"></div>
            <div>
                <strong>⚠ Missing in Source</strong><br>
                <small>Row exists only in target</small>
            </div>
        </div>
        <div class="legend-item">
            <div class="legend-color legend-missing-tgt"></div>
            <div>
                <strong>⚠ Missing in Target</strong><br>
                <small>Row exists only in source</small>
            </div>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background-color: #d4edda; border: 2px solid #28a745;"></div>
            <div>
                <strong>🔑 Primary Key</strong><br>
                <small>Light green color indicates primary key columns</small>
            </div>
        </div>
    </div>
</div>
